<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中国区量化交易系统</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <h1>中国区量化交易全栈系统</h1>
    <button id="refreshAll">刷新数据</button>
  </header>

  <main class="grid">
    <section class="card">
      <h2>可视化仪表盘</h2>
      <div id="metrics" class="metrics"></div>
    </section>

    <section class="card">
      <h2>行情展示</h2>
      <select id="symbolSelect">
        <option value="000001.SZ">000001.SZ</option>
        <option value="600519.SH">600519.SH</option>
        <option value="399001.SZ">399001.SZ</option>
      </select>
      <table id="marketTable"><thead><tr><th>日期</th><th>开</th><th>高</th><th>低</th><th>收</th><th>量</th></tr></thead><tbody></tbody></table>
    </section>

    <section class="card">
      <h2>策略管理</h2>
      <form id="strategyForm">
        <input name="name" placeholder="策略名" required />
        <input name="description" placeholder="策略描述" required />
        <button type="submit">新增策略</button>
      </form>
      <ul id="strategyList"></ul>
    </section>

    <section class="card">
      <h2>回测模块</h2>
      <form id="backtestForm">
        <input name="strategy_id" type="number" placeholder="策略ID" required />
        <input name="symbol" placeholder="标的" value="000001.SZ" required />
        <input name="start_date" value="2024-01-01" required />
        <input name="end_date" value="2024-01-10" required />
        <button type="submit">运行回测</button>
      </form>
      <ul id="backtestList"></ul>
    </section>

    <section class="card">
      <h2>模拟交易 / 订单管理</h2>
      <form id="orderForm">
        <input name="symbol" value="000001.SZ" required />
        <select name="side"><option value="buy">买入</option><option value="sell">卖出</option></select>
        <input name="quantity" type="number" value="100" required />
        <input name="price" type="number" step="0.01" value="10" required />
        <button type="submit">下单</button>
      </form>
      <table id="orderTable"><thead><tr><th>ID</th><th>标的</th><th>方向</th><th>数量</th><th>价格</th><th>状态</th></tr></thead><tbody></tbody></table>
    </section>

    <section class="card">
      <h2>持仓与资金管理</h2>
      <pre id="accountInfo"></pre>
      <ul id="positionList"></ul>
    </section>

    <section class="card">
      <h2>风控与审计日志</h2>
      <button id="riskBtn">触发风控评估</button>
      <ul id="riskList"></ul>
      <h3>审计日志</h3>
      <ul id="auditList"></ul>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
